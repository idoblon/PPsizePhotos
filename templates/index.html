<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://res.cloudinary.com/dcajb02df/image/upload/v1753960691/logo_pyncju.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PassPort Photo Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <!-- Extracted Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="bg-gray-900 text-white" oncontextmenu="return false">

    <div id="particles-js"></div>

    <!-- Header -->
    <header class="bg-gray-900/50 backdrop-blur-sm border-b border-gray-700 sticky top-0 z-10">
        <nav class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <span class="text-2xl font-bold text-blue-400">Passport Photo Pro</span>
            </div>
        </nav>
    </header>


    <!-- Main -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="relative bg-gray-800/60 backdrop-blur-md border border-gray-700 rounded-2xl shadow-2xl p-8 max-w-3xl mx-auto">

            <h2 class="text-2xl font-bold text-center mb-2">Upload Photos</h2>
            <p class="text-gray-400 text-center text-sm mb-6">Add one or more photos. Set how many copies of each you need.</p>

            <!-- Drop Zone -->
            <div id="dropZone" class="border-2 border-dashed border-gray-600 hover:border-blue-400 bg-gray-900/50 rounded-xl p-8 cursor-pointer transition-all text-center">
                <input type="file" id="imageInput" class="hidden" accept="image/*" multiple />
                <div class="flex flex-col items-center">
                    <svg class="w-14 h-14 text-gray-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-4-4V7a4 4 0 014-4h10a4 4 0 014 4v5a4 4 0 01-4 4h-2m-6 4h6m-3-4v4"/>
                    </svg>
                    <p class="text-lg font-semibold">Drag & Drop or Click to Upload</p>
                    <p class="text-sm text-gray-400 mt-1">Multiple photos supported • JPG, PNG, WEBP</p>
                </div>
            </div>

            <!-- Photo Cards List -->
            <div id="photoList" class="mt-6 space-y-3"></div>

            <!-- Add More Button -->
            <div id="addMoreWrapper" class="hidden mt-3 text-center">
                <button id="addMoreBtn" class="text-blue-400 hover:text-blue-300 text-sm border border-blue-400/40 rounded-lg px-4 py-2 transition-all hover:bg-blue-400/10">
                    + Add More Photos
                </button>
            </div>

            <!-- Advanced Options -->
            <div class="mt-8 space-y-4">
                <div class="text-center">
                    <button id="toggleAdvanced" class="text-blue-400 hover:text-blue-300 transition-all text-sm">Advanced Options</button>
                </div>
                <div id="advancedOptions" class="hidden bg-gray-900/50 p-6 rounded-lg border border-gray-700">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
                        <div>
                            <label class="block mb-1 text-sm font-medium">Width (px)</label>
                            <input type="number" id="width" value="390" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium">Height (px)</label>
                            <input type="number" id="height" value="480" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium">Spacing (px)</label>
                            <input type="number" id="spacing" value="10" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium">Border (px)</label>
                            <input type="number" id="border" value="2" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
                    <button id="generateBtn" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-all transform hover:scale-105 glow-shadow disabled:opacity-50 disabled:cursor-not-allowed">
                        Generate Sheet
                    </button>
                    <button id="downloadBtn" class="w-full sm:w-auto bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg transition-all transform hover:scale-105 hidden">
                        Download PDF
                    </button>
                </div>
                <div id="loading" class="hidden text-blue-400 font-semibold text-center">Processing images... please wait</div>
            </div>

            <!-- PDF Preview -->
            <embed id="pdfPreview" type="application/pdf" class="w-full h-[500px] mt-6 hidden rounded-lg"/>
        </div>
    </main>

    <!-- Cropper Modal -->
    <div id="cropperModal" class="cropper-modal-overlay hidden">
        <div class="cropper-modal-box">
            <h3 class="text-lg font-bold mb-3">Crop Photo</h3>
            <div class="max-h-[400px] overflow-hidden rounded-lg">
                <img id="cropModalImage" src="" style="max-width:100%; display:block;"/>
            </div>
            <div class="flex gap-3 mt-4 justify-end">
                <button id="cancelCropBtn" class="bg-gray-600 hover:bg-gray-500 text-white py-2 px-5 rounded-lg transition-all">Cancel</button>
                <button id="confirmCropBtn" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-5 rounded-lg transition-all">Crop & Save</button>
            </div>
        </div>
    </div>

    <!-- Feedback Button -->
    <button id="feedbackBtn" class="fixed bottom-5 right-5 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-5 rounded-full shadow-lg transition-all transform hover:rotate-12">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
    </button>

    <!-- Feedback Modal -->
    <div id="feedbackModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-20 hidden">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl shadow-2xl p-8 max-w-md w-full relative">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
            <h2 class="text-2xl font-bold mb-4">Feedback / Bug Report</h2>
            <form id="feedbackForm" class="space-y-4">
                <input type="text" name="contact" placeholder="Your Contact (Email or Phone)" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                <textarea name="message" placeholder="Describe your issue or suggestion..." required rows="4" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all">Submit</button>
            </form>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed bottom-1/2 right-5 text-white py-2 px-4 rounded-lg shadow-lg transform translate-x-[120%] transition-transform duration-500 z-50">
        <p id="notification-message"></p>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
